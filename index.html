<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="theme-color" content="#0a0f0c" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<title>2026 World Cup Sweepstake</title>
<meta name="description" content="Live 2026 FIFA World Cup last-team-standing sweepstake leaderboard and bracket." />
<style>
  :root {
    --bg: #0a0f0c;
    --panel: #111813;
    --panel-2: #18211b;
    --line: #25322a;
    --text: #e9f1ea;
    --muted: #8aa093;
    --accent: #ffd24a;        /* trophy gold */
    --green: #2a9d6a;         /* pitch green */
    --blue: #2f6df0;
    --teal: #1fb6a6;
    --win: #34c77b;
    --out: #e2607a;
    --shadow: 0 6px 20px rgba(0,0,0,.4);
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0; background: var(--bg); color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  }
  a { color: var(--accent); }

  header {
    padding: 26px 24px 14px; text-align: center;
    border-bottom: 1px solid var(--line);
    background: linear-gradient(180deg, #0e1611 0%, #0a0f0c 100%);
  }
  header h1 { margin: 0; font-size: 27px; letter-spacing: .4px; font-weight: 800; }
  header h1 .trophy { font-size: 22px; vertical-align: middle; margin-right: 6px; }
  header h1 .yr {
    display:inline-block; background: var(--green); color:#fff;
    padding:2px 10px; border-radius:999px; font-size:14px; vertical-align:middle; margin-right:8px;
  }
  header .meta { color: var(--muted); font-size: 13px; margin-top: 8px; }
  header .meta .dot { color: var(--accent); }
  header .sub { color: var(--muted); font-size: 12px; margin-top: 4px; }

  .view-toggle {
    display:inline-flex; gap:0; margin-top:12px; border:1px solid var(--line);
    border-radius:999px; padding:3px; background:var(--panel);
  }
  .view-toggle button {
    background:transparent; color:var(--muted); border:0; padding:6px 16px;
    font-size:12px; font-weight:600; letter-spacing:.5px; text-transform:uppercase;
    border-radius:999px; cursor:pointer; transition:background .15s,color .15s;
  }
  .view-toggle button:hover { color:var(--text); }
  .view-toggle button.active { background:var(--accent); color:#241c00; }

  main { max-width: 1400px; margin: 0 auto; padding: 24px; }
  section.block { display:none; }
  section.block.active { display:block; }

  /* ---------- Leaderboard ---------- */
  .panel {
    background: var(--panel); border:1px solid var(--line);
    border-radius:12px; padding:18px; box-shadow:var(--shadow); margin-bottom:24px;
  }
  .panel h2 {
    margin:0 0 14px; font-size:15px; letter-spacing:1.5px; text-transform:uppercase;
    color:var(--accent); border-bottom:1px solid var(--line); padding-bottom:9px;
  }
  table.lb { width:100%; border-collapse:collapse; font-size:14px; }
  table.lb th, table.lb td { padding:11px 8px; text-align:left; border-bottom:1px solid var(--line); vertical-align:top; }
  table.lb th { color:var(--muted); font-weight:600; font-size:11px; text-transform:uppercase; letter-spacing:1px; }
  table.lb td.num { font-variant-numeric:tabular-nums; text-align:center; }
  table.lb td.rank { text-align:center; font-weight:700; color:var(--muted); width:34px; }
  table.lb tr.first td.rank { color:var(--accent); font-size:16px; }
  table.lb td.player { font-weight:700; white-space:nowrap; }
  table.lb td.best { font-weight:700; }
  table.lb td.win-odds { color:var(--accent); font-weight:800; font-variant-numeric:tabular-nums; }
  table.lb tr.eliminated td.win-odds { color:var(--muted); font-weight:600; }
  table.lb tr.eliminated { opacity:.5; }

  .pill {
    display:inline-block; padding:2px 9px; border-radius:999px; font-size:11px;
    font-weight:700; letter-spacing:.3px; white-space:nowrap;
  }
  .pill.s0 { background:#243; color:#bfe7cf; }
  .pill.s1 { background:#1b3a73; color:#bcd2ff; }
  .pill.s2 { background:#1b3a73; color:#bcd2ff; }
  .pill.s3 { background:#0f4f49; color:#a9efe6; }
  .pill.s4 { background:#5a4a12; color:#ffe79a; }
  .pill.s5 { background:var(--accent); color:#241c00; }
  .pill.s6 { background:var(--accent); color:#241c00; }
  .pill.out { background:#3a1d25; color:#ffc2cf; }

  .teamchips { display:flex; flex-wrap:wrap; gap:6px; }
  .chip {
    display:inline-flex; align-items:center; gap:5px; font-size:12.5px;
    background:var(--panel-2); border:1px solid var(--line); border-radius:999px;
    padding:3px 9px 3px 5px;
  }
  .chip img { width:16px; height:16px; object-fit:contain; border-radius:2px; }
  .chip.out { opacity:.5; }
  .chip.out .nm { text-decoration:line-through; text-decoration-color:rgba(255,255,255,.4); }
  .chip.champ { border-color:var(--accent); box-shadow:0 0 0 1px var(--accent) inset; }
  .chip .stage { color:var(--muted); font-size:10.5px; }
  .chip.out .stage { color:var(--out); }

  /* ---------- Knockout bracket ---------- */
  .bracket-wrap { overflow-x:auto; padding-bottom:12px; }
  .bracket { display:flex; gap:18px; min-width:1100px; }
  .ko-col { flex:1 1 0; display:flex; flex-direction:column; justify-content:space-around; gap:12px; min-width:190px; }
  .ko-col .col-header {
    text-align:center; font-size:11px; letter-spacing:1.5px; color:var(--muted);
    text-transform:uppercase; padding:6px 0; font-weight:700;
  }
  .ko-col .col-header.fin { color:var(--accent); }
  .match {
    background:var(--panel); border:1px solid var(--line); border-radius:10px;
    padding:7px 9px; box-shadow:var(--shadow);
  }
  .match.fin { border:2px solid var(--accent); background:linear-gradient(180deg,#171f18 0%,#111813 100%); }
  .mrow { display:grid; grid-template-columns:1fr auto; gap:8px; align-items:center; padding:5px 2px; border-bottom:1px dashed var(--line); }
  .mrow:last-child { border-bottom:0; }
  .mrow.win .nm { font-weight:700; color:#fff; }
  .mrow.win .sc { color:var(--win); font-weight:800; }
  .mrow.lose { opacity:.5; }
  .mrow.lose .nm { text-decoration:line-through; text-decoration-color:rgba(255,255,255,.35); }
  .mrow .nm { display:flex; align-items:center; gap:6px; font-size:13.5px; flex-wrap:wrap; }
  .mrow .nm img { width:18px; height:18px; object-fit:contain; border-radius:2px; }
  .mrow .nm .owner { font-size:10.5px; color:var(--accent); font-weight:600; }
  .mrow .nm .owner::before { content:"·"; margin-right:4px; opacity:.55; }
  .mrow .sc { font-variant-numeric:tabular-nums; font-size:13.5px; min-width:16px; text-align:right; }
  .mstatus { text-align:center; font-size:10px; color:var(--muted); margin-top:5px; }
  .champion {
    text-align:center; padding:12px; border:2px dashed var(--accent); border-radius:12px;
    background:rgba(255,210,74,.06); font-weight:700; margin-top:8px;
  }
  .champion .t { font-size:26px; }
  .champion .name { font-size:17px; margin-top:4px; }
  .champion.tbd { color:var(--muted); border-style:dotted; }

  .empty-note {
    text-align:center; color:var(--muted); font-size:14px; padding:40px 16px;
    border:1px dashed var(--line); border-radius:12px;
  }

  /* ---------- Groups ---------- */
  .groups-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(300px,1fr)); gap:16px; }
  .group {
    background:var(--panel); border:1px solid var(--line); border-radius:10px;
    padding:12px; box-shadow:var(--shadow);
  }
  .group h3 { margin:0 0 8px; font-size:13px; letter-spacing:1px; text-transform:uppercase; color:var(--green); }
  table.gt { width:100%; border-collapse:collapse; font-size:13px; }
  table.gt th, table.gt td { padding:6px 5px; border-bottom:1px solid var(--line); text-align:center; }
  table.gt th { color:var(--muted); font-size:10px; text-transform:uppercase; letter-spacing:.5px; }
  table.gt td.tm { text-align:left; display:flex; align-items:center; gap:6px; }
  table.gt td.tm img { width:16px; height:16px; object-fit:contain; border-radius:2px; }
  table.gt td.pts { font-weight:800; color:var(--text); }
  table.gt tr.adv td.tm { color:#fff; }
  table.gt tr.adv td.tm::after { content:"●"; color:var(--win); font-size:9px; margin-left:2px; }
  table.gt td .owner { font-size:10px; color:var(--accent); font-weight:600; margin-left:2px; }

  .fixtures { display:grid; gap:8px; }
  .fx {
    display:grid; grid-template-columns:1fr auto 1fr; gap:10px; align-items:center;
    background:var(--panel); border:1px solid var(--line); border-radius:8px; padding:9px 12px; font-size:13.5px;
  }
  .fx .h { text-align:right; display:flex; justify-content:flex-end; align-items:center; gap:6px; }
  .fx .a { text-align:left; display:flex; align-items:center; gap:6px; }
  .fx img { width:18px; height:18px; object-fit:contain; border-radius:2px; }
  .fx .mid { text-align:center; color:var(--muted); font-size:11px; min-width:64px; }
  .fx .mid .score { color:var(--text); font-weight:800; font-size:15px; font-variant-numeric:tabular-nums; }
  .fx .owner { font-size:10px; color:var(--accent); font-weight:600; }

  .footer { color:var(--muted); font-size:12px; text-align:center; padding:24px 12px 40px; }
  .footer code { background:var(--panel-2); padding:2px 6px; border-radius:4px; }
  .pulse { display:inline-block; width:8px; height:8px; border-radius:50%; background:var(--win);
           animation:pulse 1.6s ease-in-out infinite; vertical-align:middle; margin-right:6px; }
  @keyframes pulse { 0%,100%{opacity:1;} 50%{opacity:.35;} }
  .err { background:#3a1d22; border:1px solid #b8334a; color:#ffd7df; padding:12px; border-radius:8px; margin:16px auto; max-width:700px; }

  @media (max-width:768px) {
    header { padding:14px 12px 8px; }
    header h1 { font-size:19px; }
    main { padding:12px; }
    .panel { padding:13px; }
    table.lb th, table.lb td { padding:8px 5px; }
    table.lb td.best .pill { font-size:10px; }
    #lb th.hide-sm, #lb td.hide-sm { display:none; }
    .groups-grid { grid-template-columns:1fr; }
  }
</style>
</head>
<body>
<header>
  <h1><span class="yr">2026</span><span class="trophy">🏆</span>World Cup Sweepstake</h1>
  <div class="meta">
    <span class="pulse"></span>
    Last team standing · auto-refreshes every 30 min ·
    <span class="dot">updated <span id="updated">loading…</span></span>
  </div>
  <div class="sub" id="phase-note"></div>
  <div class="view-toggle" role="tablist" aria-label="View">
    <button data-view="standings" class="active">Leaderboard</button>
    <button data-view="bracket">Knockouts</button>
    <button data-view="fixtures">Fixtures</button>
    <button data-view="groups">Groups</button>
  </div>
</header>

<main>
  <div id="load-error"></div>

  <section class="block active" id="view-standings">
    <div class="panel">
      <h2>Leaderboard — Last Team Standing</h2>
      <table class="lb" id="lb"></table>
    </div>
    <div class="panel">
      <h2>Picks by Team</h2>
      <table class="lb" id="team-picks"></table>
    </div>
  </section>

  <section class="block" id="view-bracket">
    <div id="bracket-area"></div>
  </section>

  <section class="block" id="view-fixtures">
    <div id="fixtures-area"></div>
  </section>

  <section class="block" id="view-groups">
    <div id="groups-area"></div>
  </section>
</main>

<div class="footer">
  Data: <a href="https://www.espn.com/soccer/" target="_blank" rel="noopener">ESPN FIFA World Cup</a>.
  Auto-rebuilds every 30 min via GitHub Actions.
  Source: <code>data/bracket.json</code> + <code>data/picks.json</code>.
</div>

<script>
  const STAGE_NAME = ["Group","Round of 32","Round of 16","Quarter-final","Semi-final","Final","Champion"];

  function fmtUpdated(iso){
    if(!iso) return "unknown";
    try { return new Date(iso).toLocaleString(undefined,{dateStyle:"medium",timeStyle:"short"}); }
    catch { return iso; }
  }
  function esc(s){ return (s==null?"":String(s)).replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c])); }
  function flag(t){ return t && t.logo ? `<img src="${esc(t.logo)}" alt="" onerror="this.style.display='none'">` : ""; }

  // Kick-off time in New Zealand time (Pacific/Auckland), e.g. "Fri 12 Jun, 7:00 am".
  function fmtNZ(iso){
    if(!iso) return "";
    try{
      return new Date(iso).toLocaleString("en-NZ",{
        timeZone:"Pacific/Auckland", weekday:"short", day:"numeric",
        month:"short", hour:"numeric", minute:"2-digit", hour12:true
      });
    }catch{ return ""; }
  }
  function fmtPercent(p){
    return (typeof p==="number" && p>0) ? `${(p*100).toFixed(1)}%` : null;
  }

  // owner lookup: team name -> "Player"
  function ownerOf(team, picks){
    const ps = (picks.team_picks && picks.team_picks[team]) || [];
    return ps.length ? ps.map(p=>p.player).join(" / ") : "";
  }
  function ownerTag(team, picks){
    const o = ownerOf(team, picks);
    return o ? `<span class="owner">${esc(o)}</span>` : "";
  }

  // ---------------- Leaderboard (last team standing) ----------------
  function buildLeaderboard(data, picks){
    const teams = data.teams || {};
    const rows = picks.players.map(player => {
      const owned = [];
      for(const [team, owners] of Object.entries(picks.team_picks||{})){
        if(!owners.some(o=>o.player===player)) continue;
        const t = teams[team];
        if(t){
          owned.push({ team, status:t.status, stage:t.stage_index||0, logo:t.logo, abbr:t.abbr });
        } else {
          owned.push({ team, status:"out", stage:0, logo:null, abbr:"", missing:true });
        }
      }
      const alive = owned.filter(t=>t.status==="alive"||t.status==="champion");
      const out = owned.filter(t=>t.status==="out");
      const hasChamp = owned.some(t=>t.status==="champion");
      const bestAlive = alive.length ? Math.max(...alive.map(t=>t.stage)) : -1;
      const bestEver = owned.length ? Math.max(...owned.map(t=>t.stage)) : 0;
      owned.sort((a,b)=> (b.stage-a.stage) || a.team.localeCompare(b.team));
      return { player, owned, aliveCount:alive.length, outCount:out.length, hasChamp, bestAlive, bestEver };
    });
    rows.sort((a,b)=>
      (b.hasChamp-a.hasChamp) ||
      (b.bestAlive-a.bestAlive) ||
      (b.aliveCount-a.aliveCount) ||
      (b.bestEver-a.bestEver) ||
      (a.outCount-b.outCount) ||
      a.player.localeCompare(b.player)
    );
    return rows;
  }

  function pill(stage, out){
    if(out) return `<span class="pill out">Out</span>`;
    if(stage>=6) return `<span class="pill s6">🏆 Champion</span>`;
    return `<span class="pill s${stage}">${STAGE_NAME[stage]||"Group"}</span>`;
  }

  function renderLeaderboard(rows){
    const head = `<thead><tr>
      <th class="rank">#</th><th>Player</th><th>Furthest alive</th>
      <th class="num">Alive</th><th class="num hide-sm">Out</th><th class="hide-sm">Teams</th>
    </tr></thead>`;
    const body = rows.map((r,i)=>{
      const cls = r.aliveCount===0 ? "eliminated" : (i===0 ? "first" : "");
      const best = r.hasChamp ? pill(6,false)
                 : r.bestAlive>=0 ? pill(r.bestAlive,false)
                 : `<span class="pill out">Knocked out</span>`;
      const chips = r.owned.map(t=>{
        const champ = t.status==="champion";
        const out = t.status==="out";
        const c = champ ? "chip champ" : out ? "chip out" : "chip";
        const fl = t.logo ? `<img src="${esc(t.logo)}" onerror="this.style.display='none'">` : "";
        const stg = champ ? "🏆" : out ? "out" : STAGE_NAME[t.stage]||"Group";
        return `<span class="${c}">${fl}<span class="nm">${esc(t.team)}</span><span class="stage">${stg}</span></span>`;
      }).join("");
      return `<tr class="${cls}">
        <td class="rank">${i+1}</td>
        <td class="player">${esc(r.player)}</td>
        <td class="best">${best}</td>
        <td class="num">${r.aliveCount}</td>
        <td class="num hide-sm">${r.outCount}</td>
        <td class="hide-sm"><div class="teamchips">${chips}</div></td>
      </tr>`;
    }).join("");
    document.getElementById("lb").innerHTML = head + `<tbody>${body}</tbody>`;
  }

  function renderTeamPicks(data, picks){
    const teams = data.teams || {};
    // Only show the Win % column if the odds feed has populated it.
    const hasOdds = Object.values(teams).some(t => typeof t.win_prob === "number");
    const oddsHead = hasOdds ? `<th class="num">Win cup</th>` : "";
    const head = `<thead><tr><th>Team</th><th>Owner</th>${oddsHead}<th>Status</th></tr></thead>`;
    const entries = Object.entries(picks.team_picks||{});
    // sort: champion, then by win % / stage desc, alive before out, then name
    entries.sort((a,b)=>{
      const ta=teams[a[0]]||{stage_index:0,status:"out"}, tb=teams[b[0]]||{stage_index:0,status:"out"};
      const av=ta.status==="out"?-1:(ta.status==="champion"?7:ta.stage_index);
      const bv=tb.status==="out"?-1:(tb.status==="champion"?7:tb.stage_index);
      const wp=(tb.win_prob||0)-(ta.win_prob||0);
      return (bv-av) || (wp) || a[0].localeCompare(b[0]);
    });
    const body = entries.map(([team,owners])=>{
      const t = teams[team];
      const out = !t || t.status==="out";
      const fl = (t&&t.logo)?`<img src="${esc(t.logo)}" style="width:16px;height:16px;vertical-align:middle;margin-right:6px;border-radius:2px" onerror="this.style.display='none'">`:"";
      const st = !t ? pill(0,true) : pill(t.stage_index||0, t.status==="out");
      const own = owners.map(o=>o.player).join(" / ");
      const wpct = (t && !out) ? fmtPercent(t.win_prob) : null;
      const oddsCell = hasOdds ? `<td class="num win-odds">${wpct || "—"}</td>` : "";
      return `<tr class="${out?'eliminated':''}">
        <td class="player">${fl}${esc(team)}</td>
        <td>${esc(own)}</td>
        ${oddsCell}
        <td>${st}</td>
      </tr>`;
    }).join("");
    document.getElementById("team-picks").innerHTML = head + `<tbody>${body}</tbody>`;
  }

  // ---------------- Knockout bracket ----------------
  function koRow(c, opp, picks){
    if(!c || !c.team || c.team==="TBD"){
      return `<div class="mrow"><div class="nm" style="color:var(--muted)">TBD</div><div class="sc">–</div></div>`;
    }
    const win = c.winner || (opp && opp.score!=null && c.score!=null && c.score>opp.score);
    const lose = opp && opp.winner || (opp && c.score!=null && opp.score!=null && opp.score>c.score);
    const cls = win ? "win" : (lose ? "lose" : "");
    return `<div class="mrow ${cls}">
      <div class="nm">${flag(c)}<span>${esc(c.team)}</span>${ownerTag(c.team,picks)}</div>
      <div class="sc">${c.score==null?"–":c.score}</div>
    </div>`;
  }
  function koMatch(ev, picks, isFinal){
    const cs = ev.competitors||[];
    const a = cs[0]||{}, b = cs[1]||{};
    // Before kick-off show the NZ start time; once live/finished show the status.
    const nz = fmtNZ(ev.date);
    let status = (ev.state==="pre" && nz) ? `${nz} NZT` : (ev.detail||(nz?`${nz} NZT`:""));
    return `<div class="match ${isFinal?'fin':''}">
      ${koRow(a,b,picks)}
      ${koRow(b,a,picks)}
      <div class="mstatus">${esc(status)}</div>
    </div>`;
  }

  function renderBracket(data, picks){
    const ko = data.knockout || {};
    const cols = [
      ["round_of_32","Round of 32"],
      ["round_of_16","Round of 16"],
      ["quarterfinals","Quarter-finals"],
      ["semifinals","Semi-finals"],
      ["final","Final"],
    ];
    const total = cols.reduce((n,[k])=> n + ((ko[k]||[]).length), 0);
    const area = document.getElementById("bracket-area");
    if(total===0){
      area.innerHTML = `<div class="empty-note">🗓️ The knockout stage begins <strong>28 June 2026</strong>.<br>
        Once the groups are decided, the Round of 32 bracket appears here with each owner's teams.</div>`;
      return;
    }
    const colHtml = cols.map(([k,label])=>{
      const evs = ko[k]||[];
      const isFinal = k==="final";
      const cards = evs.length
        ? evs.map(ev=>koMatch(ev,picks,isFinal)).join("")
        : `<div class="match"><div class="mrow"><div class="nm" style="color:var(--muted)">TBD</div><div class="sc">–</div></div></div>`;
      let champBlock = "";
      if(isFinal){
        champBlock = data.champion
          ? `<div class="champion"><div class="t">🏆</div><div>2026 World Champions</div><div class="name">${esc(data.champion)} <span style="color:var(--accent)">(${esc(ownerOf(data.champion,picks)||"—")})</span></div></div>`
          : `<div class="champion tbd"><div class="t">🏆</div><div>Champion</div><div class="name">TBD</div></div>`;
      }
      return `<div class="ko-col">
        <div class="col-header ${isFinal?'fin':''}">${label}</div>
        ${cards}${champBlock}
      </div>`;
    }).join("");
    area.innerHTML = `<div class="bracket-wrap"><div class="bracket">${colHtml}</div></div>`;
  }

  // ---------------- Fixtures ----------------
  function fixtureRow(ev, picks){
    const cs = ev.competitors||[]; const a=cs[0]||{}, b=cs[1]||{};
    const played = ev.completed || ev.state==="in";
    const nz = fmtNZ(ev.date);
    const mid = played
      ? `<span class="score">${a.score??0}–${b.score??0}</span>${ev.state==="in"?`<div style="color:var(--win)">${esc(ev.detail||"Live")}</div>`:""}`
      : (nz ? `<div>${esc(nz)}</div><div style="opacity:.7">NZT</div>` : `<div>TBD</div>`);
    const oa=ownerOf(a.team,picks), ob=ownerOf(b.team,picks);
    return `<div class="fx">
      <div class="h"><span>${esc(a.team||"TBD")}${oa?` <span class="owner">${esc(oa)}</span>`:""}</span>${flag(a)}</div>
      <div class="mid">${mid}</div>
      <div class="a">${flag(b)}<span>${esc(b.team||"TBD")}${ob?` <span class="owner">${esc(ob)}</span>`:""}</span></div>
    </div>`;
  }

  // Real group-stage fixtures only — drop knockout placeholder rows like
  // "Group A 2nd Place" / "Winners Match 73" that ESPN includes in the same date window.
  function isPlaceholderTeam(name){
    return !name || /\bplace\b|winner|runner|loser|advance|\bTBD\b/i.test(name);
  }
  function realGroupFixtures(data){
    return (data.group_fixtures||[]).filter(ev=>{
      const cs = ev.competitors||[];
      return cs.length===2 && !isPlaceholderTeam(cs[0].team) && !isPlaceholderTeam(cs[1].team);
    });
  }

  function renderFixtures(data, picks){
    const area = document.getElementById("fixtures-area");
    const fx = realGroupFixtures(data).slice().sort((a,b)=> (a.date||"").localeCompare(b.date||""));
    if(!fx.length){
      area.innerHTML = `<div class="empty-note">⚽ Group fixtures will appear here once the live feed updates.</div>`;
      return;
    }
    area.innerHTML = `
      <div class="panel" style="margin-bottom:16px;">
        <h2>Group Stage Fixtures · NZ time</h2>
      </div>
      <div class="fixtures">${fx.map(ev=>fixtureRow(ev,picks)).join("")}</div>`;
  }

  // ---------------- Groups ----------------
  // ESPN's bracket feed doesn't populate data.groups, so we reconstruct the 12
  // groups of 4 from the round-robin group-stage fixtures (connected components),
  // then compute a live table (P/W/D/L/GD/Pts) from completed results.
  function reconstructGroups(data){
    const fixtures = realGroupFixtures(data);

    const adj = new Map();
    const addEdge=(a,b)=>{
      if(!adj.has(a)) adj.set(a,new Set());
      if(!adj.has(b)) adj.set(b,new Set());
      adj.get(a).add(b); adj.get(b).add(a);
    };
    fixtures.forEach(ev=>{
      const [a,b]=ev.competitors;
      addEdge(a.team,b.team);
    });

    const seen=new Set(); const comps=[];
    for(const team of adj.keys()){
      if(seen.has(team)) continue;
      const stack=[team]; const comp=new Set();
      while(stack.length){
        const t=stack.pop();
        if(comp.has(t)) continue;
        comp.add(t); seen.add(t);
        for(const n of adj.get(t)||[]) if(!comp.has(n)) stack.push(n);
      }
      comps.push([...comp]);
    }

    const groups = comps.map(teamsArr=>{
      const table = {};
      teamsArr.forEach(t=> table[t] = {team:t, p:0,w:0,d:0,l:0,gf:0,ga:0,gd:0,pts:0, logo:null});
      fixtures.forEach(ev=>{
        const [a,b]=ev.competitors;
        if(!table[a.team] || !table[b.team]) return;
        table[a.team].logo = table[a.team].logo || a.logo;
        table[b.team].logo = table[b.team].logo || b.logo;
        if(!ev.completed) return;
        const sa=a.score||0, sb=b.score||0;
        table[a.team].p++; table[b.team].p++;
        table[a.team].gf+=sa; table[a.team].ga+=sb;
        table[b.team].gf+=sb; table[b.team].ga+=sa;
        if(sa>sb){ table[a.team].w++; table[a.team].pts+=3; table[b.team].l++; }
        else if(sa<sb){ table[b.team].w++; table[b.team].pts+=3; table[a.team].l++; }
        else { table[a.team].d++; table[b.team].d++; table[a.team].pts++; table[b.team].pts++; }
      });
      const rows = Object.values(table).map(r=>({...r, gd:r.gf-r.ga}));
      rows.sort((x,y)=> y.pts-x.pts || y.gd-x.gd || y.gf-x.gf || x.team.localeCompare(y.team));
      rows.forEach((r,i)=> r.rank=i+1);
      return { key: teamsArr.slice().sort()[0], teams: rows };
    });

    groups.sort((a,b)=> a.key.localeCompare(b.key));
    groups.forEach((g,i)=> g.name = "Group " + String.fromCharCode(65+i));
    return groups;
  }

  function renderGroupTables(data, picks){
    const area = document.getElementById("groups-area");
    const groups = reconstructGroups(data);
    if(!groups.length){
      area.innerHTML = `<div class="empty-note">⚽ Group tables will appear here once the live feed updates.</div>`;
      return;
    }
    const grid = groups.map(g=>{
      const rows = g.teams.map(t=>{
        const adv = t.rank<=2;
        const own = ownerOf(t.team,picks);
        const ownHtml = own ? `<span class="owner">${esc(own)}</span>` : "";
        const fl = t.logo?`<img src="${esc(t.logo)}" onerror="this.style.display='none'">`:"";
        return `<tr class="${adv?'adv':''}">
          <td class="tm">${fl}${esc(t.team)}${ownHtml}</td>
          <td>${t.p}</td><td>${t.w}</td><td>${t.d}</td><td>${t.l}</td>
          <td>${t.gd>0?'+':''}${t.gd}</td><td class="pts">${t.pts}</td>
        </tr>`;
      }).join("");
      return `<div class="group"><h3>${esc(g.name)}</h3>
        <table class="gt"><thead><tr><th style="text-align:left">Team</th><th>P</th><th>W</th><th>D</th><th>L</th><th>GD</th><th>Pts</th></tr></thead>
        <tbody>${rows}</tbody></table></div>`;
    }).join("");
    area.innerHTML = `<div class="groups-grid">${grid}</div>`;
  }

  // ---------------- View toggle ----------------
  function initToggle(){
    const buttons = document.querySelectorAll(".view-toggle button");
    buttons.forEach(b=> b.addEventListener("click", ()=>{
      const v = b.dataset.view;
      buttons.forEach(x=>x.classList.toggle("active", x===b));
      document.querySelectorAll("section.block").forEach(s=>s.classList.remove("active"));
      document.getElementById("view-"+v).classList.add("active");
    }));
  }
  initToggle();

  async function load(){
    try{
      const bust = "?_=" + Math.floor(Date.now()/60000);
      const [bRes, pRes] = await Promise.all([
        fetch("data/bracket.json"+bust),
        fetch("data/picks.json"+bust),
      ]);
      if(!pRes.ok) throw new Error("Failed to load picks.json");
      const picks = await pRes.json();
      let data = { teams:{}, knockout:{}, groups:[], group_fixtures:[], phase:"group", last_updated:null };
      if(bRes.ok){ try{ data = await bRes.json(); }catch{} }

      document.getElementById("updated").textContent = fmtUpdated(data.last_updated);
      const phaseLabel = { group:"Group stage in progress", knockout:"Knockout stage", complete:"Tournament complete" }[data.phase] || "";
      document.getElementById("phase-note").textContent = phaseLabel;

      const lb = buildLeaderboard(data, picks);
      renderLeaderboard(lb);
      renderTeamPicks(data, picks);
      renderBracket(data, picks);
      renderFixtures(data, picks);
      renderGroupTables(data, picks);
    }catch(e){
      document.getElementById("load-error").innerHTML =
        `<div class="err">Could not load data: ${esc(e.message)}. Check that <code>data/picks.json</code> exists.</div>`;
      console.error(e);
    }
  }
  load();
</script>
</body>
</html>
