name: Update World Cup data

on:
  schedule:
    - cron: "*/30 * * * *"   # every 30 minutes
  workflow_dispatch:           # manual "Run workflow" button
  push:
    branches: [ main ]         # also refresh on every push

permissions:
  contents: write

concurrency:
  group: update-data
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Fetch latest World Cup data
        env:
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
        run: python3 scripts/fetch_worldcup.py

      - name: Commit if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if [[ -n "$(git status --porcelain data/bracket.json)" ]]; then
            git add data/bracket.json
            git commit -m "data: refresh World Cup bracket ($(date -u '+%Y-%m-%d %H:%M UTC'))"
            git push
          else
            echo "No changes."
          fi
